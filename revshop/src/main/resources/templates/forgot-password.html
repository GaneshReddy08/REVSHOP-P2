<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{fragments/layout :: main-layout(~{::section})}">
<body>
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <h2>Reset Password</h2>
                <p>Verify your identity to set a new password</p>

                <!-- Step indicator -->
                <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; gap: 0;">
                    <div id="stepIndicator1" style="display:flex; align-items:center; gap:0.4rem;">
                        <div style="width:28px;height:28px;border-radius:50%;background:var(--primary,#6366f1);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;">1</div>
                        <span style="font-size:0.82rem;color:var(--text-secondary,#64748b);">Email</span>
                    </div>
                    <div style="flex:1;height:2px;background:var(--border-color,#e2e8f0);margin:0 0.6rem;max-width:60px;"></div>
                    <div id="stepIndicator2" style="display:flex; align-items:center; gap:0.4rem; opacity:0.4;">
                        <div style="width:28px;height:28px;border-radius:50%;background:var(--primary,#6366f1);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;">2</div>
                        <span style="font-size:0.82rem;color:var(--text-secondary,#64748b);">Verify</span>
                    </div>
                    <div style="flex:1;height:2px;background:var(--border-color,#e2e8f0);margin:0 0.6rem;max-width:60px;"></div>
                    <div id="stepIndicator3" style="display:flex; align-items:center; gap:0.4rem; opacity:0.4;">
                        <div style="width:28px;height:28px;border-radius:50%;background:var(--primary,#6366f1);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;">3</div>
                        <span style="font-size:0.82rem;color:var(--text-secondary,#64748b);">Reset</span>
                    </div>
                </div>

                <div id="forgot-error" class="error-msg" style="display: none;"></div>
                <div id="forgot-success" class="success-msg" style="display: none;"></div>

                <!-- Step 1: Email lookup -->
                <form id="step1Form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="john@example.com">
                    </div>
                    <button type="button" id="continueBtn" class="btn-auth">Continue →</button>
                </form>

                <!-- Step 2: Security Question & Answer -->
                <form id="step2Form" style="display: none;">
                    <div class="form-group">
                        <label>Security Question</label>
                        <div id="securityQuestionText" style="
                            padding: 0.75rem 1rem;
                            background: var(--bg-secondary, #f8fafc);
                            border: 1px solid var(--border-color, #e2e8f0);
                            border-radius: 8px;
                            font-size: 0.95rem;
                            color: var(--text-primary, #1e293b);
                            font-weight: 500;
                        "></div>
                        <input type="hidden" id="securityQuestionId" name="securityQuestionId">
                    </div>

                    <div class="form-group">
                        <label for="securityAnswer">Your Answer</label>
                        <input type="text" id="securityAnswer" name="securityAnswer"
                               placeholder="Type your security answer" autocomplete="off">
                    </div>

                    <button type="button" id="verifyAnswerBtn" class="btn-auth">Verify Answer →</button>
                    <button type="button" id="backBtn1" style="
                        width: 100%; margin-top: 0.5rem; padding: 0.75rem;
                        background: transparent; border: 1px solid var(--border-color, #e2e8f0);
                        border-radius: 8px; cursor: pointer;
                        color: var(--text-secondary, #64748b); font-size: 0.9rem;
                    ">← Back to Email</button>
                </form>

                <!-- Step 3: New Password -->
                <form id="step3Form" style="display: none;">
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" name="newPassword"
                               placeholder="Min 8 chars, upper, lower, digit, symbol" autocomplete="new-password">
                        <small style="color:var(--text-secondary,#64748b);font-size:0.78rem;display:block;margin-top:4px;">
                            Must be 8+ characters with uppercase, lowercase, a number, and a symbol.
                        </small>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm New Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword"
                               placeholder="Re-enter new password" autocomplete="new-password">
                    </div>

                    <button type="button" id="resetBtn" class="btn-auth">Reset Password</button>
                    <button type="button" id="backBtn2" style="
                        width: 100%; margin-top: 0.5rem; padding: 0.75rem;
                        background: transparent; border: 1px solid var(--border-color, #e2e8f0);
                        border-radius: 8px; cursor: pointer;
                        color: var(--text-secondary, #64748b); font-size: 0.9rem;
                    ">← Back to Security Question</button>
                </form>

                <div class="auth-footer">
                    <p>Back to <a th:href="@{/login}">Login</a></p>
                </div>
            </div>
        </div>

    <script>
        window.addEventListener('load', function () {

            var errorDiv   = document.getElementById('forgot-error');
            var successDiv = document.getElementById('forgot-success');
            var step1Form  = document.getElementById('step1Form');
            var step2Form  = document.getElementById('step2Form');
            var step3Form  = document.getElementById('step3Form');

            var PASSWORD_REGEX = /^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*[@#$%^&+=_!]).{8,}$/;

            function showError(msg) {
                errorDiv.textContent = msg;
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
            }

            function clearMessages() {
                errorDiv.style.display = 'none';
                successDiv.style.display = 'none';
            }

            function setStep(n) {
                ['stepIndicator1', 'stepIndicator2', 'stepIndicator3'].forEach(function (id, i) {
                    document.getElementById(id).style.opacity = (i < n) ? '1' : '0.4';
                });
            }

            function fetchSecurityQuestion(email) {
                clearMessages();
                if (!email) { showError('Please enter your email address.'); return; }

                var btn = document.getElementById('continueBtn');
                btn.textContent = 'Checking…';
                btn.disabled = true;

                fetch('/api/users/security-question?email=' + encodeURIComponent(email))
                    .then(function (res) {
                        return res.json().then(function (data) {
                            if (!res.ok) {
                                showError(data.message || 'No account found with that email address.');
                                return;
                            }
                            document.getElementById('securityQuestionText').textContent = data.questionText;
                            document.getElementById('securityQuestionId').value = data.questionId;
                            step1Form.style.display = 'none';
                            step2Form.style.display = 'block';
                            setStep(2);
                        });
                    })
                    .catch(function () {
                        showError('An error occurred. Please try again later.');
                    })
                    .finally(function () {
                        btn.textContent = 'Continue →';
                        btn.disabled = false;
                    });
            }

            // Auto-fill email from URL param
            var emailFromUrl = new URLSearchParams(window.location.search).get('email');
            if (emailFromUrl) {
                document.getElementById('email').value = emailFromUrl;
                fetchSecurityQuestion(emailFromUrl);
            }

            document.getElementById('continueBtn').addEventListener('click', function () {
                var email = document.getElementById('email').value.trim();
                if (!email) { showError('Please enter your email address.'); return; }
                fetchSecurityQuestion(email);
            });

            document.getElementById('verifyAnswerBtn').addEventListener('click', function () {
                clearMessages();
                var answer = document.getElementById('securityAnswer').value.trim();
                if (!answer) { showError('Please enter your security answer.'); return; }
                step2Form.style.display = 'none';
                step3Form.style.display = 'block';
                setStep(3);
            });

            document.getElementById('backBtn1').addEventListener('click', function () {
                clearMessages();
                step2Form.style.display = 'none';
                step1Form.style.display = 'block';
                document.getElementById('securityAnswer').value = '';
                setStep(1);
            });

            document.getElementById('backBtn2').addEventListener('click', function () {
                clearMessages();
                step3Form.style.display = 'none';
                step2Form.style.display = 'block';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
                setStep(2);
            });

            document.getElementById('resetBtn').addEventListener('click', function () {
                clearMessages();

                var email              = document.getElementById('email').value.trim();
                var securityQuestionId = parseInt(document.getElementById('securityQuestionId').value, 10);
                var securityAnswer     = document.getElementById('securityAnswer').value.trim();
                var newPassword        = document.getElementById('newPassword').value;
                var confirmPassword    = document.getElementById('confirmPassword').value;

                if (!newPassword) { showError('Please enter a new password.'); return; }
                if (!PASSWORD_REGEX.test(newPassword)) {
                    showError('Password must be at least 8 characters and include uppercase, lowercase, a digit, and a symbol (@#$%^&+=_!).');
                    return;
                }
                if (newPassword !== confirmPassword) {
                    showError('Passwords do not match. Please re-enter.');
                    return;
                }

                var resetBtn = document.getElementById('resetBtn');
                resetBtn.textContent = 'Resetting…';
                resetBtn.disabled = true;

                fetch('/api/users/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email:              email,
                        securityQuestionId: securityQuestionId,
                        securityAnswer:     securityAnswer,
                        newPassword:        newPassword
                    })
                })
                .then(function (res) {
                    return res.json().then(function (data) {
                        if (res.ok) {
                            successDiv.textContent = '✅ Password reset successful! Redirecting to login…';
                            successDiv.style.display = 'block';
                            step3Form.style.display = 'none';
                            setTimeout(function () { window.location.href = '/login'; }, 2500);
                        } else {
                            showError(data.message || 'Reset failed. Please check your answers and try again.');
                            if (data.message && data.message.toLowerCase().includes('answer')) {
                                step3Form.style.display = 'none';
                                step2Form.style.display = 'block';
                                document.getElementById('securityAnswer').value = '';
                                setStep(2);
                            }
                            resetBtn.textContent = 'Reset Password';
                            resetBtn.disabled = false;
                        }
                    });
                })
                .catch(function () {
                    showError('An error occurred. Please try again later.');
                    resetBtn.textContent = 'Reset Password';
                    resetBtn.disabled = false;
                });
            });

        }); // end window.onload
    </script>
    </section>
</body>
</html>
